services:
  db:
    image: postgres
    container_name: xrm-postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_DB: xrmdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
    name: xrm-postgres-data
