<h3>Felelős riport</h3>
<mat-form-field>
  <mat-label>Szűrés</mat-label>
  <input matInput (keyup)="applyFilter($event)" #input>
</mat-form-field>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <!-- Position Column -->
  <ng-container matColumnDef="responsibleName">
    <th mat-header-cell *matHeaderCellDef> Felelős neve </th>
    <td mat-cell *matCellDef="let element"> {{element.responsibleName}} </td>
  </ng-container>

  <ng-container matColumnDef="totalMinutes">
    <th mat-header-cell *matHeaderCellDef> Percek összesen </th>
    <td mat-cell *matCellDef="let element"> {{element.totalMinutes}} </td>
  </ng-container>

  <ng-container matColumnDef="uniquePartners">
    <th mat-header-cell *matHeaderCellDef> Egyedi partnerek száma </th>
    <td mat-cell *matCellDef="let element"> {{element.uniquePartners}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <!-- Row shown when there is no matching data. -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4">Nincs találat a szűrésre: "{{input.value}}"</td>
  </tr>
</table>

<mat-paginator [pageSizeOptions]="[5, 10, 20]"
               showFirstLastButtons>
</mat-paginator>
